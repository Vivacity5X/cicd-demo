<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 20px 50px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .navbar h2 {
            color: #38bdf8;
        }

        .nav-links a {
            margin-left: 20px;
            text-decoration: none;
            color: white;
            font-size: 14px;
            opacity: 0.8;
        }

        .nav-links a:hover {
            opacity: 1;
        }

        /* HERO */
        .hero {
            text-align: center;
            margin-top: 60px;
        }

        .hero h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .hero p {
            opacity: 0.7;
            margin-bottom: 40px;
        }

        /* CARDS */
        .cards {
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            width: 250px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .card h3 {
            margin-bottom: 10px;
        }

        .card p {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        .login { background: #3b82f6; }
        .register { background: #a855f7; }
        .admin { background: #ef4444; }

        /* FOOTER */
        footer {
            text-align: center;
            margin-top: 60px;
            font-size: 12px;
            opacity: 0.6;
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .cards {
                flex-direction: column;
                align-items: center;
            }

            .navbar {
                padding: 15px;
            }
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>MyApp</h2>
    <div class="nav-links">
        <a href="/login">Login</a>
        <a href="/register">Register</a>
        <a href="/admin">Admin</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>🚀 Welcome to Your System</h1>
    <p>Secure. Fast. Simple login experience.</p>
</div>

<!-- ACTION CARDS -->
<div class="cards">

    <div class="card">
        <h3>Login</h3>
        <p>Access your account</p>
        <a href="/login" class="btn login">Go</a>
    </div>

    <div class="card">
        <h3>Register</h3>
        <p>Create a new account</p>
        <a href="/register" class="btn register">Sign Up</a>
    </div>

    <div class="card">
        <h3>Admin Panel</h3>
        <p>Manage system data</p>
        <a href="/admin" class="btn admin">Open</a>
    </div>

</div>

<footer>
    Built with Spring Boot 💻 by VEDANT RBT23CB033
</footer>

</body>
</html>
